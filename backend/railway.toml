# Configuración de Railway para el servicio backend.
# Establece la "Root Directory" del servicio en `backend` desde el panel de
# Railway para que este archivo y el Dockerfile se detecten correctamente.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 100
